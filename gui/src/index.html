<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Statscrypt Suite</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            flex-direction: column;
        }
        .main-container {
            display: grid;
            grid-template-columns: 180px 1fr 250px;
            height: calc(100vh - 40px); 
            gap: 0;
        }
        #history {
            background: #f5f5f5;
            border-right: 1px solid #ddd;
            padding: 0;
            overflow-y: auto;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }
        #history h3 {
            margin: 0;
            padding: 10px;
            font-weight: 600;
            border-bottom: 1px solid #ddd;
            flex-shrink: 0;
            font-size: 14px;
            background: #eee;
        }
        .history-content {
            flex: 1;
            overflow-y: auto;
            padding: 5px 0;
        }
        .command-entry {
            padding: 6px 8px;
            font-family: "Monaco", "Consolas", monospace;
            font-size: 12px;
            border-bottom: 1px solid #e0e0e0;
            color: #333;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .command-entry:hover {
            background: #efefef;
        }
        #variables {
            background: #f5f5f5;
            border-left: 1px solid #ddd;
            padding: 0;
            overflow-y: auto;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }
        #variables h3 {
            margin: 0;
            padding: 10px;
            font-weight: 600;
            border-bottom: 1px solid #ddd;
            flex-shrink: 0;
            font-size: 14px;
            background: #eee;
        }
        #var-list {
            list-style: none;
            padding: 5px 0;
            margin: 0;
            flex: 1;
            overflow-y: auto;
        }
        #var-list li {
            padding: 5px 8px;
            font-family: "Monaco", "Consolas", monospace;
            font-size: 12px;
            border-bottom: 1px solid #e0e0e0;
            color: #333;
            cursor: pointer;
        }
        #var-list li:hover {
            background: #e8e8e8;
        }
        #results {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 10px;
            overflow-y: auto;
            white-space: pre-wrap; 
            font-family: "Menlo", "Monaco", "Consolas", "Courier New", monospace;
            box-sizing: border-box;
            font-size: 13px;
            line-height: 1.4;
        }
        #command-bar {
            height: 40px;
            display: flex;
            border-top: 1px solid #ddd;
            background: #fff;
        }
        #cmd-input {
            width: 100%;
            padding: 5px 10px;
            border: none;
            outline: none;
            font-size: 14px;
            font-family: "Menlo", "Monaco", "Consolas", "Courier New", monospace;
            background: #fafafa;
        }
        #cmd-input:focus {
            background: #fff;
        }
        #cmd-input::placeholder {
            color: #999;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div id="history">
            <h3>Review</h3>
            <div class="history-content"></div>
        </div>
        <div id="results"></div>
        <div id="variables">
            <h3>Variables</h3>
            <ul id="var-list"></ul>
        </div>
    </div>
    <div id="command-bar">
        <input type="text" id="cmd-input" placeholder="Type Stata command here... (try 'use &quot;path/to/file.csv&quot;')">
    </div>

    <script src="./renderer.js"></script>
</body>
</html>
